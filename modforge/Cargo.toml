[package]
name = "modforge"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

# Engine-agnostic core consumed natively by both ueforge (UE5 /
# UE4SS / Rust) and unityforge (Unity Mono / BepInEx / Rust +
# small C# shim). Anything that does not touch UObject or Mono
# lives here once. Op envelope, op registry, selector grammar,
# settings, counters, ring, scanner, winproc, server, shutdown,
# log, the pure RPG (xp / progress / format / state / store /
# disabled / catalog), plus the Effect + Trigger + Skill traits
# the per-framework crates implement.
#
# No FFI. Pure Rust rlib. Per-framework crates depend on it via
# `modforge = { path = "../modforge" }` and call it natively.

[lib]
crate-type = ["rlib"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
parking_lot = { workspace = true }
arc-swap = { workspace = true }
anyhow = { workspace = true }
crossbeam-channel = { workspace = true }
smallvec = { workspace = true }
fastrand = { workspace = true }

[lints]
workspace = true
