[workspace]
resolver = "3"
members = ["better-backpack", "injector"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
license = "MIT"
publish = false

[workspace.dependencies]
windows-sys = "0.61"
widestring = "1.2"
memoffset = "0.9"
anyhow = "1"

[profile.release]
lto = "fat"
codegen-units = 1
panic = "abort"
strip = "symbols"
