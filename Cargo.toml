[workspace]
resolver = "3"
members = ["better-backpack", "injector", "outworld-station/tweaks", "ueforge", "ueforge-deploy"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
license = "MIT"
publish = false

[workspace.dependencies]
windows-sys = "0.61"
widestring = "1.2"
memoffset = "0.9"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tiny_http = "0.12"
ureq = { version = "2", default-features = false, features = ["json"] }
cc = "1"
clap = { version = "4", features = ["derive"] }
regex = "1"
winreg = "0.55"
zip = "5"

[profile.release]
lto = "fat"
codegen-units = 1
panic = "abort"
strip = "symbols"
