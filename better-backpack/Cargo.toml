[package]
name = "better-backpack"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[lib]
name = "better_backpack"
crate-type = ["cdylib", "rlib"]

[features]
# Spawn a "Better Backpack" console window inside the game process for
# live log output. Off by default for shipping; the file log at
# <DLL_dir>/better_backpack.log is the durable record.
console = []
default = ["console"]

[dependencies]
anyhow = { workspace = true }
widestring = { workspace = true }
memoffset = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
windows-sys = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_Console",
    "Win32_System_LibraryLoader",
    "Win32_System_Memory",
    "Win32_System_SystemServices",
    "Win32_System_Threading",
    "Win32_Storage_FileSystem",
    "Win32_System_Diagnostics_Debug",
] }
