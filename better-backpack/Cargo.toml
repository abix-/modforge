[package]
name = "better-backpack"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# Output is `main.dll`, dropped at
# <game>\Augusta\Binaries\WinGRTS\ue4ss\Mods\BetterBackpack\dlls\main.dll.
# UE4SS loads CPPMods from that path. The cdylib carries our Rust mod
# logic plus a tiny C++ shim (cpp/shim.cpp) that satisfies UE4SS's
# RC::CppUserModBase ABI and forwards lifecycle calls to extern "C"
# Rust entry points.
name = "main"
crate-type = ["cdylib", "rlib"]

[features]
# Spawn a "Better Backpack" console window inside the game process for
# live log output. Off by default for shipping; the file log at
# <DLL_dir>/better_backpack.log is the durable record.
console = []
default = ["console"]

[dependencies]
anyhow = { workspace = true }
widestring = { workspace = true }
memoffset = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tiny_http = "0.12"
windows-sys = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_Console",
    "Win32_System_LibraryLoader",
    "Win32_System_Memory",
    "Win32_System_SystemServices",
    "Win32_System_Threading",
    "Win32_Storage_FileSystem",
    "Win32_System_Diagnostics_Debug",
] }

[build-dependencies]
cc = "1"

[dev-dependencies]
# Integration tests in tests/integration/ hit the mod's debug HTTP
# endpoint. Blocking client; tests must run with --test-threads=1
# because they share game state.
ureq = { version = "2", default-features = false, features = ["json"] }
