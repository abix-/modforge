[package]
name = "better-backpack"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# Output filename is `winhttp.dll` so this DLL doubles as a Windows DLL
# proxy: dropped into the game's Binaries\Win64 folder, Windows
# preferentially loads it over System32\winhttp.dll because of DLL
# search-order rules. The exports listed in winhttp.def are forwarded
# to `winhttp_orig.dll` (a copy of System32\winhttp.dll the user or
# Vortex installer places alongside), so the game's network calls keep
# working unchanged.
#
# The Rust crate name (`winhttp`) is what tests/dependents import.
name = "winhttp"
crate-type = ["cdylib", "rlib"]

[features]
# Spawn a "Better Backpack" console window inside the game process for
# live log output. Off by default for shipping; the file log at
# <DLL_dir>/better_backpack.log is the durable record.
console = []
default = ["console"]

[dependencies]
anyhow = { workspace = true }
widestring = { workspace = true }
memoffset = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
windows-sys = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_Console",
    "Win32_System_LibraryLoader",
    "Win32_System_Memory",
    "Win32_System_SystemServices",
    "Win32_System_Threading",
    "Win32_Storage_FileSystem",
    "Win32_System_Diagnostics_Debug",
] }

[build-dependencies]
cc = "1"
